<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Laboratorium 2 - Album CSS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="gallery">
            <div class="photo photo-1" tabindex="0" role="button" aria-label="Zdjęcie numer 1 w albumie">1</div>
            <div class="photo photo-2" tabindex="0" role="button" aria-label="Zdjęcie numer 2 w albumie">2</div>
            <div class="photo photo-3" tabindex="0" role="button" aria-label="Zdjęcie numer 3 w albumie">3</div>
            <div class="photo photo-4" tabindex="0" role="button" aria-label="Zdjęcie numer 4 w albumie">4</div>
            <div class="photo photo-5" tabindex="0" role="button" aria-label="Zdjęcie numer 5 w albumie">5</div>
            <div class="photo photo-6" tabindex="0" role="button" aria-label="Zdjęcie numer 6 w albumie">6</div>
            <div class="photo photo-7" tabindex="0" role="button" aria-label="Zdjęcie numer 7 w albumie">7</div>
            <div class="photo photo-8" tabindex="0" role="button" aria-label="Zdjęcie numer 8 w albumie">8</div>
            <div class="photo photo-9" tabindex="0" role="button" aria-label="Zdjęcie numer 9 w albumie">9</div>
            <div class="photo photo-10" tabindex="0" role="button" aria-label="Zdjęcie numer 10 w albumie">10</div>
        </div>
    </main>

    <script>
        const photos = document.querySelectorAll('.photo');

        function togglePhoto(photo) {
            const isActive = photo.classList.contains('active');

            photos.forEach(p => p.classList.remove('active'));

            if (!isActive) {
                photo.classList.add('active');
            }
        }

        photos.forEach(photo => {
            photo.addEventListener('click', () => {
                togglePhoto(photo);
            });

            // Znakomicie obsłużona nawigacja klawiaturą!
            photo.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    togglePhoto(photo);
                }
            });
        });
    </script>
</body>

</html>
